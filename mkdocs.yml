site_name: ProJob Wiki
site_description: Offline-first trades field operations platform research
site_url: https://ajdench.github.io/ProJob-Wiki/
theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Overview: index.md
  - Demo:
      - ProJob UI Demo: demo.md
      - Demo Notes: demo-notes.md
  - Research Overview: research-overview.md
  - Requirements:
      - Product Requirements: requirements/product-requirements.md
      - Workflow Map: workflows/workflow-map.md
  - Options:
      - Overview: options/index.md
      - Odoo + OCA Field Service: options/odoo-oca-field-service.md
      - ERPNext / Frappe: options/erpnext-frappe.md
      - Dolibarr: options/dolibarr.md
      - OpenProject: options/openproject.md
      - Atlas CMMS: options/atlas-cmms.md
      - openMAINT: options/openmaint.md
      - Offline-First PWA Stack: options/offline-first-pwa-stack.md
      - KoboToolbox / ODK: options/kobotoolbox-odk.md
  - Evaluation:
      - Shortlist: evaluation/shortlist.md
      - Scoring Matrix: evaluation/scoring-matrix.md
      - Research Questions: evaluation/research-questions.md
      - Gap Register: evaluation/gap-register.md
  - Proofs of Concept:
      - POC Plan: poc/index.md
      - Common Test Scenario: poc/common-test-scenario.md
      - Odoo + OCA Test Plan: poc/odoo-oca-test-plan.md
      - ERPNext Test Plan: poc/erpnext-test-plan.md
      - Offline PWA Test Plan: poc/offline-pwa-test-plan.md
      - Findings Template: poc/findings-template.md
      - Findings:
          - Findings Index: poc/findings/index.md
          - Odoo + OCA Findings: poc/findings/odoo-oca.md
          - ERPNext Findings: poc/findings/erpnext.md
          - Offline PWA Findings: poc/findings/offline-pwa.md
          - UI Framework Spike Findings: poc/findings/ui-framework-spike.md
  - Architecture:
      - Target Architecture: architecture/target-architecture.md
      - Web and Stack Architecture: architecture/web-stack-architecture.md
      - Suite Composition and Design: architecture/suite-composition-and-design.md
      - Application Suite Blueprint: architecture/application-suite-blueprint.md
      - Demo Architecture: architecture/demo-architecture.md
      - Adapter Contract: architecture/adapter-contract.md
      - DESIGN.md Standard: architecture/design-md-standard.md
      - UI Framework Options: architecture/ui-framework-options.md
      - Component Map: architecture/component-map.md
      - Integration Contracts: architecture/integration-contracts.md
      - Deployment Runtime: architecture/deployment-runtime.md
      - Offline Sync Model: architecture/offline-sync-model.md
      - Permissions and Tenancy: architecture/permissions-and-tenancy.md
  - Decisions:
      - ADR 0001 Shortlist: decisions/adr-0001-shortlist.md
      - ADR 0002 Documentation System: decisions/adr-0002-documentation-system.md
      - ADR 0003 Jujutsu Version Control: decisions/adr-0003-jujutsu-version-control.md
  - Operations:
      - Jujutsu Workflow: operations/jujutsu-workflow.md
  - References:
      - Sources: references/sources.md
