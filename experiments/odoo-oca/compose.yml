services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: odoo
      POSTGRES_USER: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:19.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons/field-service:/mnt/extra-addons/field-service:ro
      - ./addons/server-tools:/mnt/extra-addons/server-tools:ro
      - ./addons/web:/mnt/extra-addons/web:ro
      - ./addons/sale-workflow:/mnt/extra-addons/sale-workflow:ro

volumes:
  odoo-db-data:
  odoo-web-data:

