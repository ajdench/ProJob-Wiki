name: Publish MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: experiments/projob-ui-spike/package-lock.json

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Install UI spike dependencies
        run: npm --prefix experiments/projob-ui-spike ci

      - name: Lint design contract
        run: npx --yes @google/design.md lint design.md

      - name: Check UI spike
        run: |
          npm --prefix experiments/projob-ui-spike run lint
          npm --prefix experiments/projob-ui-spike run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
